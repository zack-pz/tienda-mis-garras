services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mistrapitos
      POSTGRES_USER: mistrapitos
      POSTGRES_PASSWORD: mistrapitos
    ports:
      - "5432:5432"
    volumes:
      - postgres-data-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mistrapitos -d mistrapitos"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    image: node:24-alpine
    working_dir: /workspace
    environment:
      CI: "true"
      DATABASE_URL: postgresql://mistrapitos:mistrapitos@postgres:5432/mistrapitos
    command: >
      sh -c "corepack enable &&
      pnpm install --frozen-lockfile &&
      pnpm --filter api start:dev"
    ports:
      - "3000:3000"
    volumes:
      - ..:/workspace
      - pnpm-store:/root/.local/share/pnpm/store
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy

  dashboard:
    image: node:24-alpine
    working_dir: /workspace
    environment:
      CI: "true"
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
    command: >
      sh -c "corepack enable &&
      pnpm install --frozen-lockfile &&
      pnpm --filter dashboard exec svelte-kit sync &&
      pnpm --filter dashboard dev --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ..:/workspace
      - pnpm-store:/root/.local/share/pnpm/store
    depends_on:
      api:
        condition: service_healthy

volumes:
  pnpm-store:
  postgres-data-dev:
